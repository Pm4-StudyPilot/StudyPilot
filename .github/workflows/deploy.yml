name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. v1.0.0 or latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    environment:
      name: production
      url: https://studypilot.aneshodza.ch
    permissions:
      packages: read
    steps:
      - name: Compute image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DEPLOY_IMAGE_NAME=${OWNER}/studypilot" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ inputs.image_tag || 'latest' }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker compose -f docker-compose.prod.yml pull

      - name: Stop old containers
        run: docker compose -f docker-compose.prod.yml down

      - name: Start new containers
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf http://localhost/api/health || exit 1

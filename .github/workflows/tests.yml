name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studypilot_test
  JWT_SECRET: test-jwt-secret
  PORT: 3000
  MINIO_ENDPOINT: localhost
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: test-bucket
  MINIO_USE_SSL: false
  VITE_API_URL: http://localhost:3000
  RESEND_API_KEY: test-resend-key

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate --config prisma/prisma.config.ts

      - name: Run lint and type checks
        run: npm run lint

  # ─── Backend Unit & Integration Tests ───────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studypilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: fclairamb/minio-github-actions
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate --config prisma/prisma.config.ts

      - name: Run database migrations
        working-directory: backend
        run: bunx prisma migrate deploy --config prisma/prisma.config.ts

      - name: Run backend tests with coverage
        working-directory: backend
        run: bun test --coverage --bail

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─── Frontend Unit Tests ────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ─── Cypress E2E Tests ─────────────────────────────────────────
  e2e-tests:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studypilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: fclairamb/minio-github-actions
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate --config prisma/prisma.config.ts

      - name: Run database migrations
        working-directory: backend
        run: bunx prisma migrate deploy --config prisma/prisma.config.ts

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Start backend
        working-directory: backend
        run: bun src/index.ts &
        env:
          NODE_ENV: test

      - name: Start frontend preview
        working-directory: frontend
        run: npx vite preview --port 5173 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000/api/health http://localhost:5173 --timeout 30000

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          wait-on: http://localhost:5173
          wait-on-timeout: 30

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: frontend/cypress/videos/

  # ─── Lighthouse Performance Audit ──────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studypilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: fclairamb/minio-github-actions
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate --config prisma/prisma.config.ts

      - name: Run database migrations
        working-directory: backend
        run: bunx prisma migrate deploy --config prisma/prisma.config.ts

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Start backend
        working-directory: backend
        run: bun src/index.ts &
        env:
          NODE_ENV: test

      - name: Start frontend preview
        working-directory: frontend
        run: npx vite preview --port 5173 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000/api/health http://localhost:5173 --timeout 30000

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/

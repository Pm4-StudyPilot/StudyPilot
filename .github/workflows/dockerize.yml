name: Dockerize

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      version_studypilot: ${{ steps.meta.outputs.version_studypilot }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER}/studypilot"
          VERSION=${GITHUB_REF#refs/tags/}
          # Strip 'v' prefix and prepend 'studypilot-'
          VERSION_STUDYPILOT=studypilot-${VERSION#v}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_studypilot=$VERSION_STUDYPILOT" >> $GITHUB_OUTPUT
          echo "image_tag=$REGISTRY/$IMAGE_NAME:$VERSION_STUDYPILOT" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    name: Trigger Deploy
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build.outputs.version_studypilot }}
